<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpace - 用户端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" x-data="app()" x-init="init()">

<!-- 登录 -->
<template x-if="!isLoggedIn">
    <div class="min-h-screen flex items-center justify-center gradient-bg">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">👤</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">车主服务</h1>
                <p class="text-gray-500 mt-1">停车缴费 · 记录查询</p>
            </div>
            <div class="space-y-4">
                <input x-model="loginForm.tenant_code" type="text" placeholder="租户编码" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <input x-model="loginForm.username" type="text" placeholder="用户名" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <input x-model="loginForm.password" type="password" placeholder="密码" @keydown.enter="login()" class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <button @click="login()" :disabled="loading" class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-50">
                    <span x-text="loading ? '登录中...' : '登录'"></span>
                </button>
                <p x-show="error" class="text-red-500 text-sm text-center" x-text="error"></p>
            </div>
        </div>
    </div>
</template>

<!-- 主界面 -->
<template x-if="isLoggedIn">
    <div>
        <!-- 顶部 -->
        <nav class="gradient-bg text-white shadow-lg">
            <div class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">👤</span>
                    <div>
                        <h1 class="text-lg font-bold">我的停车</h1>
                        <p class="text-sm opacity-75" x-text="userInfo?.real_name || userInfo?.username || ''"></p>
                    </div>
                </div>
                <a href="index.html" class="text-sm hover:bg-white/20 px-3 py-1 rounded">首页</a>
                <button @click="logout()" class="text-sm hover:bg-white/20 px-3 py-1 rounded">退出</button>
            </div>
        </nav>

        <div class="max-w-lg mx-auto px-4 py-6 space-y-6">

            <!-- 我的车辆 -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-4 py-3 bg-purple-50 border-b flex items-center justify-between">
                    <h3 class="font-semibold text-purple-900">🚗 我的车辆</h3>
                    <button @click="showAddVehicle=true" class="text-sm text-purple-600 hover:text-purple-800">+ 添加</button>
                </div>
                <div class="divide-y">
                    <template x-for="v in myVehicles" :key="v.id">
                        <div class="px-4 py-3 flex items-center justify-between">
                            <div>
                                <p class="font-medium" x-text="v.plate_number"></p>
                                <p class="text-xs text-gray-500" x-text="v.vehicle_type === 'sedan' ? '轿车' : v.vehicle_type === 'suv' ? 'SUV' : v.vehicle_type"></p>
                            </div>
                            <span class="px-2 py-1 text-xs rounded-full" :class="v.is_vip ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600'" x-text="v.is_vip ? 'VIP' : '普通'"></span>
                        </div>
                    </template>
                    <p x-show="myVehicles.length === 0" class="text-center text-gray-400 py-6">暂无车辆</p>
                </div>
            </div>

            <!-- 停车记录 -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-4 py-3 bg-blue-50 border-b">
                    <h3 class="font-semibold text-blue-900">📋 停车记录</h3>
                </div>
                <div class="divide-y max-h-64 overflow-y-auto">
                    <template x-for="log in myLogs" :key="log.id">
                        <div class="px-4 py-3">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-2">
                                    <span x-text="log.action === 'entry' ? '📥' : '📤'"></span>
                                    <span class="font-medium" x-text="log.plate_number"></span>
                                </div>
                                <span class="text-sm font-medium" :class="log.fee_amount > 0 ? 'text-green-600' : 'text-gray-400'" x-text="log.fee_amount > 0 ? '¥' + (log.fee_amount/100).toFixed(2) : ''"></span>
                            </div>
                            <div class="flex items-center justify-between mt-1 text-xs text-gray-500">
                                <span x-text="new Date(log.created_at).toLocaleString()"></span>
                                <span class="px-2 py-0.5 rounded-full" :class="log.fee_status === 'paid' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'" x-text="log.fee_status === 'paid' ? '已付' : '待付'"></span>
                            </div>
                        </div>
                    </template>
                    <p x-show="myLogs.length === 0" class="text-center text-gray-400 py-6">暂无记录</p>
                </div>
            </div>

            <!-- 账户信息 -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-4 py-3 bg-green-50 border-b">
                    <h3 class="font-semibold text-green-900">💰 我的账户</h3>
                </div>
                <div class="p-4">
                    <div class="text-center">
                        <p class="text-sm text-gray-500">账户余额</p>
                        <p class="text-3xl font-bold text-green-600" x-text="'¥' + (accountBalance/100).toFixed(2)"></p>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mt-4">
                        <button @click="recharge(1000)" class="py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 text-sm cursor-pointer">充¥10</button>
                        <button @click="recharge(5000)" class="py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 text-sm cursor-pointer">充¥50</button>
                        <button @click="recharge(10000)" class="py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 text-sm cursor-pointer">充¥100</button>
                    </div>
                </div>
            </div>

            <!-- 交易记录 -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-4 py-3 bg-gray-50 border-b">
                    <h3 class="font-semibold">💳 交易记录</h3>
                </div>
                <div class="divide-y max-h-48 overflow-y-auto">
                    <template x-for="txn in transactions" :key="txn.id">
                        <div class="px-4 py-3 flex items-center justify-between">
                            <div>
                                <p class="text-sm" x-text="txn.description || txn.transaction_type"></p>
                                <p class="text-xs text-gray-500" x-text="new Date(txn.created_at).toLocaleString()"></p>
                            </div>
                            <span class="font-medium" :class="txn.amount > 0 ? 'text-green-600' : 'text-red-600'" x-text="(txn.amount > 0 ? '+' : '') + (txn.amount/100).toFixed(2)"></span>
                        </div>
                    </template>
                    <p x-show="transactions.length === 0" class="text-center text-gray-400 py-6">暂无交易</p>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- Toast -->
<div x-show="toast.show" x-transition class="fixed top-4 right-4 z-50">
    <div class="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg" x-text="toast.message"></div>
</div>

<script>
const API = 'http://127.0.0.1:8080/api/v1';

function app() {
    return {
        isLoggedIn: false,
        loading: false,
        error: '',
        token: null,
        userInfo: null,
        loginForm: { tenant_code: 'TEST', username: 'admin', password: 'admin123' },
        myVehicles: [],
        myLogs: [],
        accountBalance: 0,
        transactions: [],
        toast: { show: false, message: '' },

        async init() {
            const saved = localStorage.getItem('user_token');
            if (saved) { this.token = saved; await this.checkAuth(); }
        },

        async fetch(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (this.token) opts.headers['Authorization'] = 'Bearer ' + this.token;
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(API + path, opts);
            const d = await r.json();
            if (r.status === 401) { this.logout(); throw new Error('请重新登录'); }
            if (!r.ok) throw new Error(d.detail || '请求失败');
            return d;
        },

        async login() {
            this.loading = true; this.error = '';
            try {
                const d = await this.fetch('POST', '/auth/login', this.loginForm);
                this.token = d.access_token;
                localStorage.setItem('user_token', this.token);
                await this.checkAuth();
            } catch (e) { this.error = e.message; }
            finally { this.loading = false; }
        },

        async checkAuth() {
            try {
                this.userInfo = await this.fetch('GET', '/auth/me');
                this.isLoggedIn = true;
                await this.refresh();
            } catch { this.logout(); }
        },

        async refresh() {
            try { this.myLogs = await this.fetch('GET', '/vehicles/logs?limit=20'); } catch {}
            try { this.transactions = await this.fetch('GET', '/billing/transactions?limit=10'); } catch {}
        },

        async recharge(amount) {
            try {
                await this.fetch('POST', '/billing/payment', { amount, payment_method: 'wechat' });
                this.showToast('充值成功: ¥' + (amount/100).toFixed(2));
                await this.refresh();
            } catch (e) { this.showToast('充值失败: ' + e.message); }
        },

        logout() {
            this.token = null; this.isLoggedIn = false;
            localStorage.removeItem('user_token');
        },

        showToast(msg) {
            this.toast = { show: true, message: msg };
            setTimeout(() => this.toast.show = false, 3000);
        }
    };
}
</script>
</body>
</html>
