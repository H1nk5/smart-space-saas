<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpace SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .modal-backdrop { background: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-init="init()">

<!-- Debug Panel (可删除) -->
<div class="fixed top-0 left-0 bg-black text-white text-xs p-2 z-50" x-show="debug" x-text="debugMsg"></div>

<!-- 登录页面 -->
<template x-if="!isLoggedIn">
    <div class="min-h-screen flex items-center justify-center gradient-bg">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900">🏢 SmartSpace</h1>
                <p class="text-gray-500 mt-2">智慧空间物业管理系统</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">租户编码</label>
                    <input x-model="loginForm.tenant_code" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input x-model="loginForm.username" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input x-model="loginForm.password" type="password" @keydown.enter="login()" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <button @click="login()" :disabled="loading" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50 cursor-pointer">
                    <span x-text="loading ? '登录中...' : '登录'"></span>
                </button>
                <p x-show="loginError" class="text-red-500 text-sm text-center" x-text="loginError"></p>
            </div>
            <div class="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
                <p class="font-medium">测试账号：</p>
                <p>租户: TEST | 用户: admin | 密码: admin123</p>
            </div>
        </div>
    </div>
</template>

<!-- 主界面 -->
<template x-if="isLoggedIn">
    <div>
        <!-- 导航栏 -->
        <nav class="gradient-bg text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-bold">🏢 SmartSpace</h1>
                        <div class="hidden md:flex space-x-4">
                            <button @click="currentPage='dashboard'" :class="currentPage==='dashboard' ? 'bg-white/20' : ''" class="px-3 py-2 rounded-md text-sm hover:bg-white/10 cursor-pointer">仪表盘</button>
                            <button @click="currentPage='vehicles'" :class="currentPage==='vehicles' ? 'bg-white/20' : ''" class="px-3 py-2 rounded-md text-sm hover:bg-white/10 cursor-pointer">车辆管理</button>
                            <button @click="currentPage='spaces'" :class="currentPage==='spaces' ? 'bg-white/20' : ''" class="px-3 py-2 rounded-md text-sm hover:bg-white/10 cursor-pointer">车位管理</button>
                            <button @click="currentPage='audit'" :class="currentPage==='audit' ? 'bg-white/20' : ''" class="px-3 py-2 rounded-md text-sm hover:bg-white/10 cursor-pointer">审计日志</button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm opacity-75" x-text="userInfo?.username || 'User'"></span>
                        <a href="index.html" class="text-sm hover:bg-white/10 px-3 py-2 rounded">首页</a>
                    <button @click="logout()" class="text-sm hover:bg-white/10 px-3 py-2 rounded cursor-pointer">退出</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

            <!-- 仪表盘 -->
            <div x-show="currentPage==='dashboard'">
                <h2 class="text-2xl font-bold mb-6">仪表盘</h2>

                <!-- 统计卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl shadow p-6 border">
                        <p class="text-sm text-gray-500">总车位数</p>
                        <p class="text-3xl font-bold text-gray-900" x-text="parkingStatus.total || 0"></p>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6 border">
                        <p class="text-sm text-gray-500">当前在场</p>
                        <p class="text-3xl font-bold text-blue-600" x-text="parkingStatus.occupied || 0"></p>
                        <div class="mt-2 w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" :style="'width: ' + (parkingStatus.occupancy_rate || 0) + '%'"></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6 border">
                        <p class="text-sm text-gray-500">空闲车位</p>
                        <p class="text-3xl font-bold text-green-600" x-text="parkingStatus.available || 0"></p>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6 border">
                        <p class="text-sm text-gray-500">占用率</p>
                        <p class="text-3xl font-bold text-purple-600" x-text="(parkingStatus.occupancy_rate || 0) + '%'"></p>
                    </div>
                </div>

                <!-- 最近日志 -->
                <div class="bg-white rounded-xl shadow border p-6">
                    <h3 class="text-lg font-semibold mb-4">最近操作</h3>
                    <div class="space-y-3">
                        <template x-for="log in recentLogs" :key="log.id">
                            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                <div>
                                    <p class="font-medium" x-text="log.action"></p>
                                    <p class="text-sm text-gray-500" x-text="log.description || ''"></p>
                                </div>
                                <span class="text-xs text-gray-400" x-text="new Date(log.created_at).toLocaleTimeString()"></span>
                            </div>
                        </template>
                        <p x-show="recentLogs.length === 0" class="text-gray-400 text-center py-4">暂无操作记录</p>
                    </div>
                </div>
            </div>

            <!-- 车辆管理 -->
            <div x-show="currentPage==='vehicles'">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">车辆管理</h2>
                    <div class="flex space-x-3">
                        <button @click="showEntryModal=true" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 cursor-pointer">🚗 车辆入场</button>
                        <button @click="showExitModal=true" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 cursor-pointer">🚗 车辆出场</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">车牌号</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">入场时间</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">出场时间</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">费用</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <template x-for="log in vehicleLogs" :key="log.id">
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-6 py-4 whitespace-nowrap font-medium" x-text="log.plate_number"></td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <span class="px-2 py-1 text-xs rounded-full" :class="log.action === 'entry' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'" x-text="log.action === 'entry' ? '入场' : '出场'"></span>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.entry_time ? new Date(log.entry_time).toLocaleString() : '-'"></td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.exit_time ? new Date(log.exit_time).toLocaleString() : '-'"></td>
                                        <td class="px-6 py-4 whitespace-nowrap font-medium" :class="log.fee_amount > 0 ? 'text-green-600' : 'text-gray-400'" x-text="log.fee_amount > 0 ? '¥' + (log.fee_amount/100).toFixed(2) : '-'"></td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <span class="px-2 py-1 text-xs rounded-full" :class="log.fee_status === 'pending' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'" x-text="log.fee_status === 'pending' ? '待结算' : '已付款'"></span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <p x-show="vehicleLogs.length === 0" class="text-gray-400 text-center py-8">暂无车辆记录</p>
                </div>
            </div>

            <!-- 车位管理 -->
            <div x-show="currentPage==='spaces'">
                <h2 class="text-2xl font-bold mb-6">车位管理</h2>
                <div class="bg-white rounded-xl shadow border p-6">
                    <div class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-3">
                        <template x-for="space in spaces" :key="space.id">
                            <div class="aspect-square rounded-lg flex items-center justify-center text-sm font-bold cursor-pointer border-2"
                                 :class="space.status === 'available' ? 'bg-green-100 border-green-400 text-green-800' : space.status === 'occupied' ? 'bg-red-100 border-red-400 text-red-800' : 'bg-gray-100 border-gray-400 text-gray-500'"
                                 @click="showToast('车位 ' + space.space_number + ': ' + (space.status === 'available' ? '空闲' : '占用'))"
                                 x-text="space.space_number">
                            </div>
                        </template>
                    </div>
                    <p x-show="spaces.length === 0" class="text-gray-400 text-center py-8">暂无车位数据</p>
                    <div class="flex items-center justify-center space-x-6 mt-6 text-sm">
                        <div class="flex items-center"><span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span>空闲</div>
                        <div class="flex items-center"><span class="w-3 h-3 bg-red-400 rounded-full mr-2"></span>占用</div>
                    </div>
                </div>
            </div>

            <!-- 审计日志 -->
            <div x-show="currentPage==='audit'">
                <h2 class="text-2xl font-bold mb-6">审计日志</h2>
                <div class="bg-white rounded-xl shadow border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">时间</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">级别</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">描述</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <template x-for="log in auditLogs" :key="log.id">
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="new Date(log.created_at).toLocaleString()"></td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <span class="px-2 py-1 text-xs rounded-full" :class="log.severity === 'critical' ? 'bg-red-100 text-red-800' : 'bg-blue-100 text-blue-800'" x-text="log.severity"></span>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap font-medium" x-text="log.action"></td>
                                        <td class="px-6 py-4 text-sm text-gray-500" x-text="log.description || '-'"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <p x-show="auditLogs.length === 0" class="text-gray-400 text-center py-8">暂无审计记录</p>
                </div>
            </div>
        </main>
    </div>
</template>

<!-- 车辆入场模态框 -->
<div x-show="showEntryModal" x-cloak class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6" @click.outside="showEntryModal=false">
        <h3 class="text-lg font-semibold mb-4">🚗 车辆入场</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">车牌号</label>
                <input x-model="entryForm.plate" type="text" placeholder="京A12345" class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">车辆类型</label>
                <select x-model="entryForm.type" class="w-full border rounded-lg px-4 py-2 focus:outline-none">
                    <option value="sedan">轿车</option>
                    <option value="suv">SUV</option>
                    <option value="truck">卡车</option>
                    <option value="ev">电动车</option>
                </select>
            </div>
        </div>
        <div class="flex justify-end space-x-3 mt-6">
            <button @click="showEntryModal=false" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 cursor-pointer">取消</button>
            <button @click="submitEntry()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer">确认入场</button>
        </div>
    </div>
</div>

<!-- 车辆出场模态框 -->
<div x-show="showExitModal" x-cloak class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6" @click.outside="showExitModal=false">
        <h3 class="text-lg font-semibold mb-4">🚗 车辆出场</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">车牌号</label>
                <input x-model="exitForm.plate" type="text" placeholder="京A12345" class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">支付方式</label>
                <select x-model="exitForm.payment" class="w-full border rounded-lg px-4 py-2 focus:outline-none">
                    <option value="cash">现金</option>
                    <option value="wechat">微信</option>
                    <option value="alipay">支付宝</option>
                </select>
            </div>
        </div>
        <div class="flex justify-end space-x-3 mt-6">
            <button @click="showExitModal=false" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 cursor-pointer">取消</button>
            <button @click="submitExit()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 cursor-pointer">确认出场</button>
        </div>
    </div>
</div>

<!-- Toast通知 -->
<div x-show="toast.show" x-transition class="fixed bottom-4 right-4 z-50">
    <div class="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg" x-text="toast.message"></div>
</div>

<script>
const API_BASE = 'http://127.0.0.1:8080/api/v1';

function app() {
    return {
        isLoggedIn: false,
        loading: false,
        loginError: '',
        currentPage: 'dashboard',
        token: null,
        userInfo: null,
        showEntryModal: false,
        showExitModal: false,
        debug: false,
        debugMsg: '',
        loginForm: { tenant_code: 'TEST', username: 'admin', password: 'admin123' },
        entryForm: { plate: '', type: 'sedan' },
        exitForm: { plate: '', payment: 'wechat' },
        parkingStatus: { total: 0, available: 0, occupied: 0, occupancy_rate: 0 },
        vehicleLogs: [],
        spaces: [],
        auditLogs: [],
        recentLogs: [],
        toast: { show: false, message: '' },

        async init() {
            console.log('App init...');
            const saved = localStorage.getItem('smartspace_token');
            if (saved) {
                this.token = saved;
                await this.loadUserData();
            }
        },

        async api(method, path, body = null) {
            const url = API_BASE + path;
            console.log('API:', method, url);

            const opts = {
                method: method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (this.token) {
                opts.headers['Authorization'] = 'Bearer ' + this.token;
            }
            if (body) {
                opts.body = JSON.stringify(body);
            }

            try {
                const resp = await fetch(url, opts);
                console.log('Response:', resp.status);

                if (resp.status === 401) {
                    this.logout();
                    throw new Error('登录已过期');
                }

                const data = await resp.json();
                console.log('Data:', data);

                if (!resp.ok) {
                    throw new Error(data.detail || '请求失败');
                }
                return data;
            } catch (e) {
                console.error('API Error:', e);
                throw e;
            }
        },

        async login() {
            this.loading = true;
            this.loginError = '';
            try {
                const data = await this.api('POST', '/auth/login', this.loginForm);
                this.token = data.access_token;
                localStorage.setItem('smartspace_token', this.token);
                this.isLoggedIn = true;
                await this.loadUserData();
                this.showToast('登录成功');
            } catch (e) {
                this.loginError = e.message;
            } finally {
                this.loading = false;
            }
        },

        async loadUserData() {
            try {
                this.userInfo = await this.api('GET', '/auth/me');
                this.isLoggedIn = true;
                await this.loadDashboard();
            } catch (e) {
                console.error('Load user failed:', e);
                this.logout();
            }
        },

        async loadDashboard() {
            try {
                this.parkingStatus = await this.api('GET', '/vehicles/status');
            } catch (e) {
                console.error('Load status failed:', e);
            }

            try {
                this.auditLogs = await this.api('GET', '/audit/?limit=10');
                this.recentLogs = this.auditLogs.slice(0, 5);
            } catch (e) {
                console.error('Load audit failed:', e);
            }

            try {
                this.spaces = await this.api('GET', '/spaces/');
            } catch (e) {
                console.error('Load spaces failed:', e);
            }

            try {
                this.vehicleLogs = await this.api('GET', '/vehicles/logs?limit=20');
            } catch (e) {
                console.error('Load vehicle logs failed:', e);
            }
        },

        async submitEntry() {
            if (!this.entryForm.plate) {
                this.showToast('请输入车牌号');
                return;
            }
            try {
                const result = await this.api('POST', '/vehicles/entry', {
                    plate_number: this.entryForm.plate,
                    vehicle_type: this.entryForm.type
                });
                this.showToast('入场成功，车位: ' + result.space_id);
                this.showEntryModal = false;
                this.entryForm.plate = '';
                await this.loadDashboard();
            } catch (e) {
                this.showToast('入场失败: ' + e.message);
            }
        },

        async submitExit() {
            if (!this.exitForm.plate) {
                this.showToast('请输入车牌号');
                return;
            }
            try {
                const result = await this.api('POST', '/vehicles/exit', {
                    plate_number: this.exitForm.plate,
                    payment_method: this.exitForm.payment
                });
                this.showToast('出场成功，费用: ¥' + (result.fee_amount / 100).toFixed(2));
                this.showExitModal = false;
                this.exitForm.plate = '';
                await this.loadDashboard();
            } catch (e) {
                this.showToast('出场失败: ' + e.message);
            }
        },

        logout() {
            this.token = null;
            this.isLoggedIn = false;
            this.userInfo = null;
            localStorage.removeItem('smartspace_token');
        },

        showToast(message) {
            this.toast = { show: true, message: message };
            setTimeout(() => { this.toast.show = false; }, 3000);
        }
    };
}
</script>

</body>
</html>
